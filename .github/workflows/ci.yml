name: ci

on:
  push:
  pull_request:

jobs:
  host:
    strategy:
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        env:
          CC: ${{ matrix.compiler }}
        run: make test
      - name: Sanitizers
        if: matrix.compiler == 'clang'
        env:
          CC: clang
        run: make test-asan
